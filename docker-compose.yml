services:

  # ──────────────────────────────────────────────
  # PostgreSQL - 서비스별 DB를 하나의 인스턴스에서 스키마로 분리
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rushorder-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rushorder
      POSTGRES_PASSWORD: rushorder
      POSTGRES_DB: rushorder
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rushorder"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Kafka (KRaft) - Zookeeper 없이 단일 브로커
  # ──────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.9.0
    container_name: rushorder-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ──────────────────────────────────────────────
  # Redis 7 - 멱등키, 캐시, 분산 락
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rushorder-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Elasticsearch 8.x - CQRS Read Model (한국어 형태소 분석)
  # ──────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.17.0
    container_name: rushorder-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ──────────────────────────────────────────────
  # Keycloak 24 - OAuth2/OIDC 인증 서버
  # ──────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: rushorder-keycloak
    ports:
      - "9090:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ──────────────────────────────────────────────
  # Zipkin - 분산 추적
  # ──────────────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: rushorder-zipkin
    ports:
      - "9411:9411"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9411/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  es-data:
